{% extends 'base.html' %}
{% block page_title %}批量上传{% endblock %}
{% block content %}
<h2>批量上传照片</h2>
<p class="text-muted small">文件名（不含扩展名）将作为人员编号。仅处理已在您管理组备案的证件号。</p>
{% if oracle_sync_auto %}
<p class="text-muted small">已启用 Oracle 同步：照片在本系统保存成功后将自动写入配置的 Oracle 表字段。</p>
{% endif %}
<form id="uploadForm">
    <div class="mb-3">
        <label class="form-label">选择文件夹（包含 .jpg/.png 照片）</label>
        <input type="file" id="folderInput" webkitdirectory directory multiple class="form-control">
    </div>
    {% if oracle_sync_show_opt_in %}
    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="syncToOracle" {% if oracle_sync_default_checked %}checked{% endif %}>
        <label class="form-check-label" for="syncToOracle">同时将照片写入 Oracle（按后台配置的表与字段）</label>
    </div>
    {% endif %}
    <button type="submit" class="btn btn-primary">开始上传</button>
</form>
<div id="progress" class="mt-3"></div>
<script>
document.getElementById('uploadForm').onsubmit = async (e) => {
    e.preventDefault();
    const files = document.getElementById('folderInput').files;
    const formData = new FormData();
    for (let file of files) {
        if (file.type.startsWith('image/')) {
            formData.append('photos', file);
        }
    }
    {% if oracle_sync_show_opt_in %}
    const syncEl = document.getElementById('syncToOracle');
    if (syncEl && syncEl.checked) {
        formData.append('sync_to_oracle', '1');
    }
    {% endif %}
    const response = await fetch('/api/photos/upload_batch/', {
        method: 'POST',
        body: formData,
        credentials: 'same-origin',
        headers: { 'X-CSRFToken': '{{ csrf_token }}' }
    });
    const data = await response.json();
    if (!response.ok) {
        if (data.quality_redirect) {
            window.location.href = data.quality_redirect;
            return;
        }
        document.getElementById('progress').innerHTML = `<div class="alert alert-danger">${data.error || '上传失败'}</div>`;
        return;
    }
    let msg = `上传批次编号：${data.batch_id}，已成功提交处理 ${data.count ?? 0} 张。`;
    if (data.skipped_count) {
        msg += ` 跳过未备案编号 ${data.skipped_count} 张。`;
    }
    if (data.quality_partial && data.quality_redirect) {
        msg += ` <strong>另有 ${data.quality_fail_count} 张未通过规范</strong>，<a href="${data.quality_redirect}">点此查看问题说明与预览</a>。`;
    }
    document.getElementById('progress').innerHTML = msg;
};
</script>
{% endblock %}
